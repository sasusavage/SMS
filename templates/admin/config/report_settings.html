{% extends "base.html" %}
{% block title %}Report settings{% endblock %}
{% block topbar_title %}Configuration{% endblock %}
{% block content %}
<div class="content-narrow">
  <div class="page-header">
    <div class="breadcrumb"><a href="{{ url_for('admin_config.index') }}">Configuration</a> / Report settings</div>
    <h1>Report card settings</h1>
  </div>

  <div class="card">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="checkbox-row"><input type="checkbox" id="scp" name="show_class_position" {{ 'checked' if rs.show_class_position }}><label for="scp">Show class position</label></div>
      <div class="checkbox-row"><input type="checkbox" id="sgp" name="show_grade_point" {{ 'checked' if rs.show_grade_point }}><label for="sgp">Show grade point</label></div>
      <div class="checkbox-row"><input type="checkbox" id="ssr" name="show_skills_ratings" {{ 'checked' if rs.show_skills_ratings }}><label for="ssr">Show skills ratings</label></div>
      <div class="checkbox-row"><input type="checkbox" id="tcr" name="teacher_comment_required" {{ 'checked' if rs.teacher_comment_required }}><label for="tcr">Teacher comment required</label></div>
      <div class="checkbox-row"><input type="checkbox" id="hcr" name="head_comment_required" {{ 'checked' if rs.head_comment_required }}><label for="hcr">Head comment required</label></div>
      <div class="form-group mt-4">
        <label>"Next term begins" label</label>
        <input name="next_term_begins_label" value="{{ rs.next_term_begins_label or '' }}">
      </div>
      <button type="submit" class="btn">Save settings</button>
    </form>
  </div>
</div>
{% endblock %}
