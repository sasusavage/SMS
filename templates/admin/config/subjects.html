{% extends "base.html" %}
{% block title %}Subjects{% endblock %}
{% block content %}
<div class="card">
  <p><a href="{{ url_for('admin_config.index') }}">← Configuration</a></p>
  <h2>Subjects</h2>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Name</label><input name="name" required>
    <label>Code</label><input name="code" placeholder="e.g. MATH">
    <label><input type="checkbox" name="is_core" checked> Core subject</label>
    <button type="submit">Add subject</button>
  </form>
  <table style="margin-top:20px">
    <thead><tr><th>Name</th><th>Code</th><th>Core</th><th></th></tr></thead>
    <tbody>
      {% for s in subjects %}
      <tr><td>{{ s.name }}</td><td>{{ s.code or '—' }}</td><td>{{ 'Yes' if s.is_core else 'No' }}</td>
        <td><form method="post" action="{{ url_for('admin_config.delete_subject', subject_id=s.id) }}" style="display:inline" onsubmit="return confirm('Delete this subject?')">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button style="margin:0;padding:4px 8px;background:#8a1c13">Delete</button></form></td></tr>
      {% else %}<tr><td colspan="4">None yet.</td></tr>{% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
