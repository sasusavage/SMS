{% extends "base.html" %}
{% block title %}Bulk SMS{% endblock %}
{% block topbar_title %}Messaging{% endblock %}
{% block content %}
<div class="content-narrow">
  <div class="page-header">
    <div class="breadcrumb"><a href="{{ url_for('admin_messaging.index') }}">Messaging</a> / Bulk SMS</div>
    <h1>Bulk SMS</h1>
    <p class="muted">Send an SMS to the guardians of a class, or all guardians.</p>
  </div>
  <div class="card">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group"><label>Send to</label>
        <select name="target" required>
          <option value="all">All guardians</option>
          {% for c in classes %}<option value="class:{{ c.id }}">Class: {{ c.name }}</option>{% endfor %}
        </select></div>
      <div class="form-group"><label>Message</label>
        <textarea name="message" rows="4" maxlength="320" required></textarea></div>
      <button class="btn" onclick="return confirm('Send this SMS now?')">Send SMS</button>
    </form>
  </div>
</div>
{% endblock %}
