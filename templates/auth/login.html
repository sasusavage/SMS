{% extends "auth_base.html" %}
{% block title %}Log in — SchoolBrain{% endblock %}
{% block content %}
<h2>Log in</h2>
<p class="muted">Welcome back. Sign in to your school.</p>
<form method="post" action="{{ url_for('auth.login') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-group">
    <label for="school_slug">School code</label>
    <input id="school_slug" name="school_slug" placeholder="e.g. demo-ges"
           autocomplete="organization">
    <small>Leave blank if you are a platform administrator.</small>
  </div>
  <div class="form-group">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="username">
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required
           autocomplete="current-password">
  </div>
  <button type="submit" class="btn block">Log in</button>
</form>
<p class="mt-4 muted" style="display:flex;justify-content:space-between">
  <a href="{{ url_for('auth.password_reset') }}">Forgot password?</a>
  <a href="{{ url_for('onboarding.signup') }}">Create a school</a>
</p>
{% endblock %}
