{% extends "base.html" %}
{% block title %}Log in — SchoolBrain{% endblock %}
{% block content %}
<div class="card" style="max-width:420px;margin:40px auto">
  <h2>Log in</h2>
  <form method="post" action="{{ url_for('auth.login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="school_slug">School code</label>
    <input id="school_slug" name="school_slug" placeholder="e.g. demo-ges"
           autocomplete="organization">
    <small>Leave blank if you are a platform administrator.</small>

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="username">

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required
           autocomplete="current-password">

    <button type="submit">Log in</button>
  </form>
  <p style="margin-top:16px">
    <a href="{{ url_for('auth.password_reset') }}">Forgot password?</a>
  </p>
</div>
{% endblock %}
