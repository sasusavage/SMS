{% extends "auth_base.html" %}
{% block title %}Password reset — SchoolBrain{% endblock %}
{% block content %}
<h2>Reset password</h2>
<p class="muted">Enter your email and your administrator will help you reset.</p>
<form method="post" action="{{ url_for('auth.password_reset') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-group">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>
  </div>
  <button type="submit" class="btn block">Request reset</button>
</form>
<p class="mt-4"><a href="{{ url_for('auth.login') }}">← Back to login</a></p>
{% endblock %}
