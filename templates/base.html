<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SchoolBrain{% endblock %}</title>
  <style>
    /* Minimal Step-1 styling — full design comes after the backend (Spec 2 style). */
    body { font-family: system-ui, sans-serif; margin: 0; background: #f4f6f8; color: #1f2933; }
    .nav { background: #1f3a5f; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
    .nav a { color: #cfe0ff; text-decoration: none; margin-left: 16px; }
    .container { max-width: 880px; margin: 32px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; }
    .flash.danger { background: #fde2e1; color: #8a1c13; }
    .flash.warning { background: #fff3cd; color: #7a5b00; }
    .flash.info { background: #d8ecff; color: #08436b; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; font-size: .9rem; }
    input { width: 100%; padding: 10px; border: 1px solid #cbd2d9; border-radius: 8px; box-sizing: border-box; }
    button { margin-top: 16px; background: #1f3a5f; color: #fff; border: 0; padding: 11px 18px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #e4e7eb; }
  </style>
</head>
<body>
  {% if current_user.is_authenticated %}
  <div class="nav">
    <strong>SchoolBrain</strong>
    <span>
      {{ current_user.name }}
      <form action="{{ url_for('auth.logout') }}" method="post" style="display:inline">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" style="margin:0;padding:6px 12px;background:#33506f">Log out</button>
      </form>
    </span>
  </div>
  {% endif %}
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
