<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartSchool - The Best School Management System in Ghana. NaCCA-compliant software with Sasu AI assistant, Paystack integration, and digital QR ID cards for elite institutions.">
    <meta name="keywords" content="Best School Management System in Ghana, NaCCA School Software, Sasu AI, school portal ghana, student management, paystack school fees">
    <title>{% block title %}SmartSchool | Elite NaCCA School Management System{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- PWA -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#4f46e5">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <!-- PWA Install Banner (Hidden by default) -->
    <div id="pwa-install-banner" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md p-6 bg-slate-900/80 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl z-[9999] flex flex-col gap-4 items-center text-center animate-slide-up">
        <img src="/static/img/icon.png" class="w-16 h-16 rounded-xl shadow-lg border border-white/5" alt="SmartSchool App Icon">
        <div>
            <h4 class="text-white font-bold text-lg">Install SmartSchool App</h4>
            <p class="text-slate-400 text-sm">Experience the premium dashboard as a native app for faster access and offline support.</p>
        </div>
        <div class="flex gap-4 w-full">
            <button onclick="hideInstallBanner()" class="flex-1 py-3 bg-white/5 text-slate-300 font-bold rounded-xl hover:bg-white/10 transition-all">Not Now</button>
            <button onclick="installPWA()" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-500 shadow-lg shadow-indigo-500/20 transition-all">INSTALL</button>
        </div>
    </div>

    {% block body %}{% endblock %}

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
