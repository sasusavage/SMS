<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ code }} — SchoolBrain</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card" style="text-align:center">
    <div class="auth-brand" style="justify-content:center"><span class="brand-mark">S</span> SchoolBrain</div>
    <div class="error-page">
      <div class="error-code">{{ code }}</div>
      <p class="muted">{{ message }}</p>
      <a class="btn" href="{{ url_for('auth.login') }}">Go to login</a>
    </div>
  </div>
</div>
</body>
</html>
